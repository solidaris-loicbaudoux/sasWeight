
<!-- Dialog pour ajouter un produit -->
<p-dialog 
  [(visible)]="isDisplayed"
  [modal]="true"
  [style]="{width: '50vw'}"
  [header]="'Ajouter un nouveau produit'"
  [draggable]="false"
  [resizable]="false"
  [closable]="false"
>
  <div class="flex flex-column gap-3">
    <div class="flex flex-column gap-2">
      <label htmlFor="name">Nom du produit</label>
      <input 
        pInputText 
        id="name" 
        placeholder="Ex: Laptop Dell XPS"
      />
    </div>

    <div class="flex flex-column gap-2">
      <label htmlFor="description">Description</label>
      <textarea 
        pInputTextarea
        id="description" 
        rows="3"
        placeholder="Description du produit..."
      ></textarea>
    </div>

    <div class="flex gap-3">
      <div class="flex flex-column gap-2 flex-1">
        <label htmlFor="price">Prix (€)</label>
        <p-inputNumber 
          inputId="price"
          mode="currency" 
          currency="EUR" 
          locale="fr-FR"
        ></p-inputNumber>
      </div>

      <div class="flex flex-column gap-2 flex-1">
        <label htmlFor="rating">Note (0-5)</label>
        <p-inputNumber 
          inputId="rating"
          [min]="0" 
          [max]="5"
          [step]="1"
        ></p-inputNumber>
      </div>
    </div>

    <div class="flex flex-column gap-2">
      <label htmlFor="image">URL de l'image</label>
      <input 
        pInputText 
        id="image" 
        placeholder="https://..."
      />
    </div>
  </div>
    
  <p-button label="close" (click)="closeDialog()" />
    <p-button 
      label="Enregistrer" 
      icon="pi pi-check" 
      styleClass="p-button-success"
    ></p-button>
</p-dialog>
