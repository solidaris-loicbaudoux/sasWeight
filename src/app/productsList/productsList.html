<div class="surface-ground px-4 py-8 md:px-6 lg:px-8">
  <div class="text-900 font-bold text-6xl mb-4 text-center">(1) Nos Produits {{ productCount }}</div>
  <div class="text-700 text-xl mb-6 text-center line-height-3">Découvrez notre sélection de produits high-tech</div>

  <div class="grid">
    @for (product of productList(); track product) {
      <div class="col-12 md:col-6 lg:col-3">
        <div class="surface-card shadow-2 border-round p-4">
          <div class="relative mb-3">
            <img title="t" [src]="product.image" [alt]="product.name" class="w-full border-round" />
          </div>
          <div class="flex justify-content-between align-items-start mb-3">
            <div>
              <span class="text-900 font-medium text-xl block mb-2">{{ product.name }}</span>
              <span class="text-600 text-sm block">{{ product.description }}</span>
            </div>
          </div>
          <div class="flex align-items-center justify-content-between mb-3">
            <p-rating [ngModel]="product.rating" [readonly]="true" ></p-rating>
          </div>
          <div class="flex align-items-center justify-content-between">
            <span class="text-2xl font-semibold text-900">{{ product.price }}€</span>
            <p-button
              icon="pi pi-shopping-cart"
              label="Ajouter"
              styleClass="p-button-rounded"
            ></p-button>
          </div>
        </div>
      </div>
    }
  </div>
</div>
