<p-menubar [model]="items">
  <ng-template pTemplate="start">
    <span class="text-2xl font-bold text-primary">Demo Shop</span>
  </ng-template>

      <p-button 
      icon="pi pi-plus" 
      label="Ajouter un produit" 
      (click)="showDialog()"
      styleClass="p-button-success"
    ></p-button>


  <app-cart></app-cart>
</p-menubar>


<div class="p-4">
  <router-outlet></router-outlet>
</div>



<dialog-add-product 
  [displayDialogInput]="displayDialog()"
  (closeDialogEvent)="closeByChild($event)"
></dialog-add-product>
