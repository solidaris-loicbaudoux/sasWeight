<div class="card">
    <p-toast />
    <p-table stripedRows 
    [loading]="loadingData" 
            sortField="aileName" 
            [sortOrder]="-1"
            [value]="personList" 
            [size]="'small'"
            #dt2
            [globalFilterFields]="['name', 'surname', 'chambreNumber', 'aileName']"
            editMode="row"
            [tableStyle]="{ 'min-width': '50rem' }"
            dataKey="id"
            [expandedRowKeys]="expandedRows"
        >


        <ng-template #caption>
            <div class="flex">
                <p-iconfield iconPosition="left" class="ml-auto">
                    <p-inputicon>
                        <i class="pi pi-search"></i>
                    </p-inputicon>
                    <input pInputText type="text" (input)="dt2.filterGlobal($event.target.value, 'contains')" placeholder="Search keyword" />
                </p-iconfield>
            </div>
        </ng-template>


        <ng-template #header>
            <tr>
                <th style="width: 5%"></th>
                <th pSortableColumn="name" style="width:5%">
                    <div class="flex items-center gap-2">
                        Nom
                        <p-sortIcon field="name" />
                    </div>
                </th>
                <th pSortableColumn="surname" style="width:5%">
                    <div class="flex items-center gap-2">
                        Prénom
                        <p-sortIcon field="surname" />
                    </div>
                </th>
                <th pSortableColumn="chambreNumber" style="width:5%">
                    <div class="flex items-center gap-2">
                        Chambre
                        <p-sortIcon field="chambreNumber" />
                    </div>
                </th>
                <th pSortableColumn="aileName" style="width:5%">
                    <div class="flex items-center gap-2">
                        Aile
                        <p-sortIcon field="aileName" />
                    </div>
                </th>
                <th style="width:12%">Action</th>
            </tr>
        </ng-template>

        <ng-template #body let-person let-editing="editing" let-expanded="expanded" let-ri="rowIndex">
            
            <tr [pEditableRow]="person">
                <td>
                    <p-button type="button" pRipple [pRowToggler]="person" [text]="true" severity="secondary" [rounded]="true" [icon]="expanded ? 'pi pi-chevron-down' : 'pi pi-chevron-right'" />
                </td>
                <td>
                    <p-cellEditor>
                        <ng-template #input>
                            <input title="name" pInputText type="text" [(ngModel)]="person.name" />
                        </ng-template>
                        <ng-template #output>
                            {{ person.name }}
                        </ng-template>
                    </p-cellEditor>
                </td>
                <td>
                    <p-cellEditor>
                        <ng-template #input>
                            <input title="surname" pInputText type="text" [(ngModel)]="person.surname" required />
                        </ng-template>
                        <ng-template #output>
                            {{ person.surname }}
                        </ng-template>
                    </p-cellEditor>
                </td>
                <td>
                    <p-cellEditor>
                        <ng-template #input>
                            <input title="chambreNumber" pInputText type="text" [(ngModel)]="person.chambreNumber" />
                        </ng-template>
                        <ng-template #output>
                            {{ person.chambreNumber }}
                        </ng-template>
                    </p-cellEditor>
                </td>
                <td>
                    <p-cellEditor>
                        <ng-template #input>
                            <input title="aileName" pInputText type="text" [(ngModel)]="person.aileName" />
                        </ng-template>
                        <ng-template #output>
                            {{ person.aileName }}
                        </ng-template>
                    </p-cellEditor>
                </td>
                <td>
                    <div class="flex items-center justify-center gap-2">
                        <button title="init" *ngIf="!editing" pButton pRipple type="button" pInitEditableRow icon="pi pi-pencil" (click)="onRowEditInit(person)" severity="danger"></button>
                        <button title="save" *ngIf="editing" pButton pRipple type="button" pSaveEditableRow icon="pi pi-check" (click)="onRowEditSave(person)" severity="secondary"></button>
                        <button title="cancel" *ngIf="editing" pButton pRipple type="button" pCancelEditableRow icon="pi pi-times" (click)="onRowEditCancel(person, ri)" severity="secondary"></button>
                    </div>
                </td>
            </tr>
        </ng-template>


        <!-- remplacer #expandedrow par #expansion -->
        <ng-template #expandedrow let-product>
                    <tr>
                        <td colspan="7">
                            <div class="p-4">
                                <h5>Graphique des poids</h5>
                                <p-table [value]="product.orders" dataKey="id">
                                    <ng-template #header>
                                        <tr>
                                            <th pSortableColumn="status">
                                                <div class="flex items-center gap-2">
                                                    Status
                                                    <p-sortIcon field="status" />
                                                </div>
                                            </th>
                                            <th style="width: 4rem"></th>
                                        </tr>
                                    </ng-template>
                                    <ng-template #body let-order>
                                        <tr>
                                            <td>{{ order.id }}</td>
                                            <td>{{ order.customer }}</td>
                                            <td>{{ order.date }}</td>
                                            <td>{{ order.amount | currency: 'USD' }}</td>
                                            <td>
                                                <p-button type="button" icon="pi pi-search" />
                                            </td>
                                        </tr>
                                    </ng-template>
                                    <ng-template #emptymessage>
                                        <tr>
                                            <td colspan="6">There are no order for this product yet.</td>
                                        </tr>
                                    </ng-template>
                                </p-table>
                            </div>
                        </td>
                    </tr>
                </ng-template>
    </p-table>
</div>



<p-button (click)="deleteAllAndRefill()" label="Remplir la base de données avec des données de test" class="mt-4"></p-button>
