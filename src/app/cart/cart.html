<div class="cart-container">
  <p-button
    icon="pi pi-shopping-cart"
    [badge]="getItemCount().toString()"
    badgeClass="p-badge-danger"
    styleClass="p-button-rounded p-button-text"
    (click)="op.toggle($event)"
    (keydown)="$event"
  ></p-button>

  <p-popover #op>
    <div class="surface-card p-4" style="width: 450px">
      <div class="flex align-items-center justify-content-between mb-4">
        <span class="text-900 font-bold text-2xl">Mon Panier</span>
        <span class="text-600">{{ getItemCount() }} article(s)</span>
      </div>

      @if (cartItems().length === 0) {
        <div class="text-center py-4">
          <i class="pi pi-shopping-cart text-4xl text-400 mb-3"></i>
          <p class="text-600">Votre panier est vide</p>
        </div>
      }

      @for (item of cartItems(); track item; let last = $last) {
        <div
          [class.border-bottom-1]="!last"
          [class.surface-border]="!last"
          class="pb-3 mb-3">
          <div class="flex align-items-center">
            <img  title="t" [src]="item.image" [alt]="item.name"
              class="border-round mr-3"
              style="width: 80px; height: 80px; object-fit: cover" />
              <div class="flex-1">
                <div class="text-900 font-semibold mb-2">{{ item.name }}</div>
                <div class="flex align-items-center justify-content-between">
                  <span class="text-600">Qté: {{ item.quantity }}</span>
                  <span class="text-900 font-bold">{{ item.price * item.quantity }}€</span>
                </div>
              </div>
              <p-button
                icon="pi pi-trash"
                styleClass="p-button-rounded p-button-text p-button-danger ml-2"
                [text]="true"
              ></p-button>
            </div>
          </div>
        }

        @if (cartItems().length > 0) {
          <div>
            <div class="border-top-1 surface-border pt-3">
              <div class="flex align-items-center justify-content-between mb-3">
                <span class="text-900 font-bold text-xl">Total</span>
                <span class="text-900 font-bold text-2xl">{{ getTotal() }}€</span>
              </div>
              <p-button
                label="Passer la commande"
                icon="pi pi-check"
                styleClass="w-full p-button-success"
              ></p-button>
            </div>
          </div>
        }
      </div>
    </p-popover>
  </div>
